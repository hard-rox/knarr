name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Lint, Build & Test (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x

      - name: Lint
        run: dotnet format --verify-no-changes

      - name: Restore
        run: dotnet restore Knarr.slnx

      - name: Build
        run: dotnet build Knarr.slnx -c Release --no-restore

      - name: Test
        run: dotnet test Knarr.slnx -c Release --no-build --verbosity normal
